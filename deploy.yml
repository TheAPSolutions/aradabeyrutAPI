name: Build and Deploy API to Natro

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      PROJECT_PATH: ./MenuAppAPI/AradaBeyrutAPI.csproj
      PUBLISH_DIR: ./publish-output

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore "${{ env.PROJECT_PATH }}"

      - name: Build
        run: dotnet build "${{ env.PROJECT_PATH }}" --configuration Release --no-restore

      - name: Publish
        run: dotnet publish "${{ env.PROJECT_PATH }}" --configuration Release --output "${{ env.PUBLISH_DIR }}"

      - name: Show published files
        run: ls -la "${{ env.PUBLISH_DIR }}"

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to Natro via FTP
        run: |
          lftp -e "
          set ssl:verify-certificate no;
          open -u ${{ secrets.NATRO_FTP_USERNAME }},${{ secrets.NATRO_FTP_PASSWORD }} -p ${{ secrets.NATRO_FTP_PORT }} ${{ secrets.NATRO_FTP_SERVER }};
          mirror -R --delete --verbose ${{ env.PUBLISH_DIR }} ${{ secrets.NATRO_FTP_REMOTE_PATH }};
          bye
          "
